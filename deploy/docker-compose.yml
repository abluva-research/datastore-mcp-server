version: '3.8'

services:
  mcp-toolbox:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: mcp-toolbox
    ports:
      - "5000:5000"
    volumes:
      - ./tools.yaml:/app/tools.yaml:ro
    command: ["--tools-file", "/app/tools.yaml", "--address", "0.0.0.0", "--port", "5000", "--allowed-origins", "*", "--allowed-hosts", "*"]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
